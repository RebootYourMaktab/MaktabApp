<!DOCTYPE html>
<html>
<head>
  <title>Maktab Student Dashboard</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.cdnfonts.com/css/gagalin" rel="stylesheet">

  <style>
    body { 
      background-color: seashell; 
      color: #27445D; 
      font-family: sans-serif; 
      display: flex; 
      justify-content: center; 
      align-items: center; 
      min-height: 100vh; 
      margin: 0; 
      padding: 10px;
      box-sizing: border-box; 
      -webkit-tap-highlight-color: transparent; 
    }
    
    h1, h2, h3, h4 { color: #27445D; font-family: 'GAGALIN', cursive; letter-spacing: 1px; font-weight: normal; margin-top: 0;}
    
    .screen { 
      background-color: wheat; 
      padding: 20px; 
      border-radius: 10px; 
      box-shadow: 0 4px 12px rgba(128, 0, 0, 0.15); 
      text-align: center; 
      width: 100%; 
      max-width: 400px; 
    }
    
    #dashboard-screen, #task-screen { display: none; width: 100%; max-width: 600px; }
  
    .app-logo { 
       width: 35vw;             
       max-width: 140px;        
       aspect-ratio: 1 / 1;     
       object-fit: cover;      
       border-radius: 50%;      
       background-color: transparent; 
       margin-bottom: 15px; 
    }
    
    input, select { 
      padding: 12px; 
      margin: 10px 0 20px 0; 
      border-radius: 5px; 
      border: 1px solid #27445D; /* FIXED: Added missing semicolon */
      width: 85%; 
      font-size: 1rem; 
      color: #27445D; 
    }
    
    button { background-color: #27445D; color: Seashell; border: 3px solid #27445D; border-radius: 12px; font-size: 1.1rem; font-family: 'Gagalin', sans-serif; letter-spacing: 1px; cursor: pointer; padding: 10px 20px; transition: all 0.2s; box-shadow: 0 4px 6px rgba(0,0,0,0.05); user-select: none; margin: 5px; }
    button:active { background-color: #27445D; color: Seashell; transform: scale(0.95); }
    
    .login-btn { width: 90%; padding: 12px; }
    .save-exit-btn { background-color: #27445D; color: Seashell; padding: 10px 20px; font-size: 1.2rem; margin-top: 20px; }
    .exit-app-btn { background-color: #27445D; color: tan;  padding: 10px 20px; font-size: 1.1rem; margin-top: 30px; }
    
    .button-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 15px; margin-top: 20px; }
    .category-btn { display: flex; flex-direction: column; justify-content: center; align-items: center; padding: 15px 10px; height: 100%; }

    /* --- FIXED TABLE CSS --- */
    table { width: 100%; table-layout: fixed; border-collapse: collapse; margin-top: 10px; background-color: wheat; }
    th, td { padding: 8px 5px; font-size: 0.9rem; word-wrap: break-word; }
    th { font-family: 'Gagalin', sans-serif; color: #27445D; text-align: center; border-bottom: 2px solid #27445D; padding-bottom: 10px;}
    tr { border-bottom: 2px solid rgba(39, 68, 93, 0.2); }
    
    /* Forces the 50% / 25% / 25% sizing on your table */
    th:nth-child(1), td:nth-child(1) { width: 50%; text-align: left; }
    th:nth-child(2), td:nth-child(2) { width: 25%; text-align: center; }
    th:nth-child(3), td:nth-child(3) { width: 25%; text-align: center; }
    /* ----------------------- */

    .status-toggle { cursor: pointer; }
    .forest-tick { color: limegreen; font-size: 1.5rem; }
    .gold-tick { color: goldenrod; font-size: 1.5rem; }
    .gray-cloud { background-color: transparent; color: #8db0cf; font-size: 0.7rem; padding: 3px 6px; border-radius: 10px; }
    .progress-container { width: 100%; background-color: rgba(128, 0, 0, 0.1); border-radius: 5px; height: 8px; margin-top: 8px; overflow: hidden; }
    .progress-fill { background-color: limegreen; height: 100%; transition: width 0.3s ease; }
    
    #task-progress-wrapper { height: 12px; margin-bottom: 15px; }

    /* Audio Button Styling */
    .audio-btn { background-color: #27445D; color: Seashell; border: 2px solid #2980b9; padding: 4px 8px; font-size: 0.7rem; border-radius: 5px; margin-top: 8px; margin-left: 0; display: inline-block; font-family: sans-serif; letter-spacing: 0; }
    .audio-btn:active { background-color: sienna; transform: scale(0.95); }
    .audio-playing { background-color: tan; border-color: tan; } 

    .quote-box { 
      margin-top: 30px; 
      margin-bottom: 20px; 
      font-size: 1rem; 
      font-family: 'Comic Sans MS';
      font-style: normal;
      color: #27445D; 
      line-height: 1.4; 
      padding: 20px 10px 20px 10px; 
      min-height: 40px;
      border: 1px dashed #27445D; 
      border-radius: 12px; 
    }

    @media (min-width: 600px) { .button-grid { grid-template-columns: repeat(4, 1fr); } }
  </style>
</head>
<body>

  <div id="login-screen" class="screen">
    <img src="logo.png" alt="Maktab Logo" class="app-logo">
    <h2>Reboot Your Maktab</h2>
    <input type="password" id="studentPin" inputmode="numeric" pattern="[0-9]*" maxlength="4" placeholder="1234">
    <button class="login-btn" onclick="attemptLogin()">Log In</button>
    <br>
    <div id="quote-box" class="quote-box">......</div>
    <p id="error-message" style="color: red; font-weight: bold;"></p>
  </div>

  <div id="dashboard-screen" class="screen">
    <div id="welcome-message"></div>
    <div class="button-grid" id="category-grid"></div>
    <button class="exit-app-btn" onclick="location.reload()">Exit App</button>
  </div>

  <div id="task-screen" class="screen">
    <h2 id="task-category-title">Tasks</h2>
    
    <div class="progress-container" id="task-progress-wrapper">
      <div class="progress-fill" id="task-progress-fill" style="width: 0%;"></div>
    </div>

    <table>
      <thead><tr><th>Task</th><th>Status</th><th>Teacher</th></tr></thead>
      <tbody id="task-list-body"></tbody>
    </table>
    
    <button class="save-exit-btn" onclick="saveAndExit()">Save and Return</button>
  </div>

  <script>
    // --- CONFIGURE YOUR URL HERE ---
    const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbwTSI8edGh-riqutqrOci9d66hKos8a7kcB7VDw6FsUhZw91C4IvHOlKvR47Vr_DHqK/exec";
    
    const urlParams = new URLSearchParams(window.location.search);
    const urlToken = urlParams.get('token'); 

    let currentStudentPin = "";
    let currentCategory = "";
    let pendingChanges = {};
    
    let currentTasksList = [];
    let currentCategories = [];

    // Audio Control Variables
    let currentAudio = null;
    let playingTaskId = null;

    function apiCall(payload) {
      return fetch(SCRIPT_URL, {
        method: 'POST',
        redirect: 'follow', 
        headers: {
          'Content-Type': 'text/plain;charset=utf-8' 
        },
        body: JSON.stringify(payload)
      })
      .then(response => {
        if (!response.ok) {
          throw new Error('Network response was not ok');
        }
        return response.json();
      });
    }

    // Fetch Quote in the background
    window.onload = function() {
        apiCall({ action: 'getQuote' })
        .then(data => {
            if (data && data.success && data.quote) {
                document.getElementById('quote-box').innerText = '"' + data.quote + '"';
            } else {
                document.getElementById('quote-box').innerText = '"Messenger of Allah (ﷺ) said: Whoever takes a path upon which to obtain knowledge, Allah makes the path to Paradise easy for him"';
            }
        })
        .catch(err => {
            document.getElementById('quote-box').innerText = '"Messenger of Allah (ﷺ) said: Whoever takes a path upon which to obtain knowledge, Allah makes the path to Paradise easy for him"'; 
        });
    };

    function attemptLogin() {
      const pin = document.getElementById('studentPin').value;
      
      apiCall({ action: 'login', pin: pin, token: urlToken })
      .then(data => {
        if (data.success) {
          currentStudentPin = pin;
          currentCategories = data.studentData.categories; 
          
          document.getElementById('login-screen').style.display = 'none';
          document.getElementById('dashboard-screen').style.display = 'block';
          
          document.getElementById('welcome-message').innerHTML = `
            <h1>${data.studentData.name}</h1>
            <h2 style="margin-bottom: 5px">* Ahlan wa sahlan *</h2>
          `;
          
          renderDashboard(currentCategories);
        } else { 
          document.getElementById('error-message').innerText = data.message || "Invalid login."; 
        }
      })
      .catch(err => {
        console.error("Login Error:", err);
        document.getElementById('error-message').innerText = "Network Error.";
      });
    }

    function renderDashboard(categories) {
      const grid = document.getElementById('category-grid');
      grid.innerHTML = '';
      categories.forEach(cat => {
        const btn = document.createElement('button');
        btn.className = 'category-btn';
        btn.innerHTML = `<div>${cat.name}</div><div class="progress-container"><div class="progress-fill" style="width: ${cat.progress || 0}%;"></div></div>`;
        btn.onclick = () => loadTasks(cat.name);
        grid.appendChild(btn);
      });
    }

    function loadTasks(cat) {
      currentCategory = cat;
      
      apiCall({ action: 'getTasks', pin: String(currentStudentPin), category: cat })
      .then(data => {
        if (data && data.tasks) {
          currentTasksList = data.tasks; 
          
          document.getElementById('dashboard-screen').style.display = 'none';
          document.getElementById('task-screen').style.display = 'block';
          document.getElementById('task-category-title').innerText = cat;
          
          renderTasks(currentTasksList);
          updateTaskProgressBar(); 
        } else { alert("No tasks found."); }
      })
      .catch(err => {
        console.error("Load Tasks Error:", err);
        alert("Could not load tasks.");
      });
    }

    function renderTasks(tasks) {
      const tbody = document.getElementById('task-list-body');
      tbody.innerHTML = '';
      tasks.forEach(task => {
        const isComp = (task.status === "Completed");
        
        let audioButtonHtml = "";
        if (task.mp3Url && task.mp3Url.length > 5) {
            audioButtonHtml = `<button class="audio-btn" id="audio-btn-${task.taskId}" onclick="toggleAudio('${task.taskId}', '${task.mp3Url}')">▶ Play Audio</button>`;
        }

        const tr = document.createElement('tr');
        tr.innerHTML = `
          <td>
            <div style="display:flex; flex-direction:column; align-items:flex-start;">
                <span>${task.taskName}</span>
                ${audioButtonHtml}
            </div>
          </td>
          <td class="center status-toggle" onclick="toggle('${task.taskId}', this)">
            ${isComp ? `<span class="forest-tick">✓</span>` : `<span class="gray-cloud">To be completed</span>`}
          </td>
          <td class="center">${task.verification === "Verified" ? `<span class="gold-tick">✓</span>` : `<span class="gray-cloud">Not Verified</span>`}</td>`;
        tbody.appendChild(tr);
      });
    }

    function toggleAudio(taskId, url) {
        const btn = document.getElementById(`audio-btn-${taskId}`);

        if (currentAudio && playingTaskId === taskId) {
            currentAudio.pause();
            currentAudio.currentTime = 0; 
            btn.innerHTML = "▶ Play Audio";
            btn.classList.remove("audio-playing");
            currentAudio = null;
            playingTaskId = null;
            return;
        }

        if (currentAudio) {
            currentAudio.pause();
            currentAudio.currentTime = 0;
            const oldBtn = document.getElementById(`audio-btn-${playingTaskId}`);
            if (oldBtn) {
                oldBtn.innerHTML = "▶ Play Audio";
                oldBtn.classList.remove("audio-playing");
            }
        }

        currentAudio = new Audio(url);
        currentAudio.play().catch(err => {
            alert("Could not play this audio. Check the link in the spreadsheet.");
            console.error(err);
        });
        
        btn.innerHTML = "⏹ Stop Audio";
        btn.classList.add("audio-playing");
        playingTaskId = taskId;

        currentAudio.onended = function() {
            btn.innerHTML = "▶ Play Audio";
            btn.classList.remove("audio-playing");
            currentAudio = null;
            playingTaskId = null;
        };
    }

    function stopAllAudio() {
        if (currentAudio) {
            currentAudio.pause();
            currentAudio = null;
            playingTaskId = null;
        }
    }

    function toggle(taskId, el) {
      const isComp = el.innerHTML.includes('forest-tick');
      const newStatus = isComp ? "To be completed" : "Completed";
      
      pendingChanges[taskId] = newStatus;
      el.innerHTML = isComp ? `<span class="gray-cloud">Pending</span>` : `<span class="forest-tick">✓</span>`;
      
      const taskIndex = currentTasksList.findIndex(t => String(t.taskId) === String(taskId));
      if (taskIndex !== -1) {
          currentTasksList[taskIndex].status = newStatus;
      }
      updateTaskProgressBar();
    }

    function updateTaskProgressBar() {
      if (!currentTasksList || currentTasksList.length === 0) return;
      const completedCount = currentTasksList.filter(t => t.status === "Completed" || t.verification === "Verified").length;
      const percent = Math.round((completedCount / currentTasksList.length) * 100);
      document.getElementById('task-progress-fill').style.width = percent + '%';
    }

    function saveAndExit() {
      stopAllAudio(); 
      
      if (Object.keys(pendingChanges).length === 0) { 
        returnToDashboard();
        return; 
      }
      
      const payload = { 
        action: 'batchUpdate', 
        pin: currentStudentPin, 
        category: currentCategory, 
        changes: Object.keys(pendingChanges).map(k => ({taskId: k, status: pendingChanges[k]})) 
      };
      
      apiCall(payload)
      .then((data) => { 
        if (data.rowsUpdated === 0) {
          alert("ERROR: The server could not write to the specific rows!");
        } else {
          pendingChanges = {}; 
          
          const catIndex = currentCategories.findIndex(c => c.name === currentCategory);
          if (catIndex !== -1) {
              const completedCount = currentTasksList.filter(t => t.status === "Completed" || t.verification === "Verified").length;
              currentCategories[catIndex].progress = Math.round((completedCount / currentTasksList.length) * 100);
          }
          
          renderDashboard(currentCategories);
          returnToDashboard();
        }
      })
      .catch(err => { 
        console.error("Save error:", err);
        alert("Error saving."); 
      });
    }

    function returnToDashboard() {
        stopAllAudio(); 
        document.getElementById('task-screen').style.display = 'none';
        document.getElementById('dashboard-screen').style.display = 'block';
    }
  </script>
</body>
</html>
